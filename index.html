<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HAFY — Helper App For You</title>
  <meta name="description" content="HAFY — Helper App For You. Quick tools for everyday tasks: video, audio, passwords." />
  <link rel="stylesheet" href="./assets/style.css" />
  <script src="./assets/layout.js" defer></script>
  <script src="./assets/i18n.js" defer></script>
</head>
<body>
  <div class="container">

    <div id="siteHeader"></div>

    <div class="hero">
      <div class="hero-inner">
        <div class="hero-title">HAFY</div>
        <p class="hero-sub" data-i18n="desc_home">Quick tools for everyday tasks. Choose a category.</p>

        <div class="btnrow">
          <a class="btn primary" href="./tools/" data-i18n="nav_tools">Tools</a>
          <a class="btn" href="./tools/password/generator.html">Password generator</a>
        </div>
      </div>
    </div>

    <div class="grid" style="margin-top:16px">
      <div class="card">
        <div class="h1" data-i18n="title_home">Welcome</div>

        <div class="tools">
          <a class="tool" href="./tools/video/">
            <div class="tool-row">
              <div class="icon">🎬</div>
              <div class="tool-col">
                <b data-i18n="cat_video">Video tools</b>
                <div class="small">Convert / compress / trim (soon)</div>
              </div>
            </div>
          </a>

          <a class="tool" href="./tools/audio/">
            <div class="tool-row">
              <div class="icon">🎧</div>
              <div class="tool-col">
                <b data-i18n="cat_audio">Audio tools</b>
                <div class="small">Convert / cut / normalize (soon)</div>
              </div>
            </div>
          </a>

          <a class="tool" href="./tools/password/">
            <div class="tool-row">
              <div class="icon">🔐</div>
              <div class="tool-col">
                <b data-i18n="cat_password">Password tools</b>
                <div class="small">Generator works now</div>
              </div>
            </div>
          </a>
        </div>

        <div id="siteFooter"></div>
      </div>

      <div class="card">
        <div class="ad"><span data-i18n="ad">Ad space</span> 300×250</div>
        <div style="height:12px"></div>
        <div class="ad"><span data-i18n="ad">Ad space</span> 300×600</div>
        <div style="height:12px"></div>
        <div class="ad"><span data-i18n="ad">Ad space</span> 320×100</div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.HAFY_LAYOUT) window.HAFY_LAYOUT.mount("./");
    });
  </script>
</body>
</html>
