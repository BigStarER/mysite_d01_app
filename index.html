<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HAFY — Helper App For You</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <script src="./assets/layout.js" defer></script>
  <script src="./assets/i18n.js" defer></script>
</head>
<body>
  <div class="container">

    <!-- header injected by layout.js -->
    <div id="siteHeader"></div>

    <div class="grid">
      <div class="card">
        <div class="h1" data-i18n="title_home">Welcome</div>
        <p class="p" data-i18n="desc_home">Quick tools for everyday tasks. Choose a category.</p>

        <div class="tools">
          <a class="tool" href="./tools/">
            <b data-i18n="nav_tools">Tools</b>
            <div class="small">All tools</div>
          </a>

          <a class="tool" href="./tools/video/">
            <b data-i18n="cat_video">Video tools</b>
            <div class="small">/tools/video/</div>
          </a>

          <a class="tool" href="./tools/audio/">
            <b data-i18n="cat_audio">Audio tools</b>
            <div class="small">/tools/audio/</div>
          </a>

          <a class="tool" href="./tools/password/">
            <b data-i18n="cat_password">Password tools</b>
            <div class="small">/tools/password/</div>
          </a>
        </div>

        <!-- footer injected by layout.js -->
        <div id="siteFooter"></div>
      </div>

      <div class="card">
        <div class="ad"><span data-i18n="ad">Ad space</span> 300×250</div>
        <div style="height:12px"></div>
        <div class="ad"><span data-i18n="ad">Ad space</span> 300×600</div>
        <div style="height:12px"></div>
        <div class="ad"><span data-i18n="ad">Ad space</span> 320×100</div>
      </div>
    </div>
  </div>

  <script>
    // base = "./" because we are at root
    window.HAFY_LAYOUT && window.HAFY_LAYOUT.mount("./");
  </script>
</body>
</html>
