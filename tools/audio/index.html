<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HAFY — Audio tools</title>
  <link rel="stylesheet" href="../../assets/style.css" />
  <script src="../../assets/layout.js" defer></script>
  <script src="../../assets/i18n.js" defer></script>
</head>
<body>
  <div class="container">
    <div id="siteHeader"></div>

    <div class="grid">
      <div class="card">
        <div class="h1">Audio tools</div>
        <p class="p">Инструменты для работы с твоим аудио (каркас).</p>

        <div class="tools">
          <div class="tool">
            <b>Convert audio</b>
            <div class="small">mp3 / m4a / wav — скоро.</div>
          </div>
          <div class="tool">
            <b>Cut audio</b>
            <div class="small">Скоро.</div>
          </div>
          <div class="tool">
            <b>Normalize loudness</b>
            <div class="small">Скоро.</div>
          </div>
          <div class="tool">
            <b>Change bitrate</b>
            <div class="small">Скоро.</div>
          </div>
        </div>

        <div id="siteFooter"></div>
      </div>

      <div class="card">
        <div class="ad"><span data-i18n="ad">Ad space</span> 300×250</div>
        <div style="height:12px"></div>
        <div class="ad"><span data-i18n="ad">Ad space</span> 300×600</div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.HAFY_LAYOUT) window.HAFY_LAYOUT.mount("../../");
    });
  </script>
</body>
</html>
